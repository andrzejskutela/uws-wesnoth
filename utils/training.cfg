# Training modules engine (mode-agnostic).
#
# Applies each side's accumulated training (see lua/training.lua) to every newly
# placed unit of that side, as a single "trained" trait. Include this macro in any
# scenario that should support training; grant training with [qquws_add_random_training]
# (random) or [qquws_add_training_module] (a specific option, for player choice).
#define QQUWS_TRAINING_MODULES
	[event]
		name=unit placed
		first_time_only=no

		[qquws_apply_training_to_unit]
			id=$unit.id
			side=$unit.side
		[/qquws_apply_training_to_unit]
	[/event]
#enddef
